case: heex-experiment
description: >-
  The HEEx-visibility experiment (ADR 0011). A function component referenced from
  a `~H` or embedded `.heex` template is alive; unreferenced components and
  exports remain high-confidence dead-code claims. This proves template
  compilation produces ordinary call facts without turning its generated
  function-name atom into a dynamic-dispatch hazard. Requires the
  phoenix_live_view dependency (mix deps.get).
subjects:
  - kind: export
    name: HeexExp.Components.greeting/1
    file: lib/heex_exp/components.ex
    expected: alive
    because: >-
      HeexExp.Page.render/1 references <.greeting/> in its ~H template, which the
      compiler tracer records as an ordinary function call — so greeting is alive.
  - kind: export
    name: HeexExp.TemplatePage.index/1
    file: lib/heex_exp/template_page.ex
    expected: alive
    because: >-
      The application calls the function generated by embed_templates, so its
      ordinary inbound edge keeps the generated function alive.
  - kind: export
    name: HeexExp.Components.template_greeting/1
    file: lib/heex_exp/components.ex
    expected: alive
    because: >-
      The embedded index.html.heex template references template_greeting/1 and
      the compiler attributes the ordinary call event to the generated index/1.
  - kind: export
    name: HeexExp.TemplatePage.__mix_recompile__?/0
    file: lib/heex_exp/template_page.ex
    expected: alive
    because: >-
      Phoenix.Template generates this exact Mix compiler hook; it is framework
      infrastructure rather than an application export and is not claimable.
  - kind: export
    name: HeexExp.Components.unused_component/1
    file: lib/heex_exp/components.ex
    expected: dead
    minConfidence: high
    because: >-
      No ~H template or call references unused_component/1. Because HEEx
      references ARE visible, an unrendered component is a clean dead-code claim;
      plain `use Phoenix.Component` declares no behaviour, so it stays claimable.
  - kind: export
    name: HeexExp.TemplatePage.unrelated_dead/1
    file: lib/heex_exp/template_page.ex
    expected: dead
    minConfidence: high
    because: >-
      The String.to_atom/1 fact used to name the generated index/1 function is
      not a runtime invocation sink, so it cannot cap this unrelated export.
