case: atom-map-key-safe
description: >-
  Function-scoped atom conversion used directly as a standard-library Map key
  is data production, not dynamic receiver dispatch. Strings and comments with
  dispatch-like text remain inert.
subjects:
  - kind: export
    name: NeutralAtomKey.Lookup.fetch/2
    file: lib/neutral_atom_key/lookup.ex
    expected: alive
    because: The application calls the lookup and its atom result is only a Map.fetch! key.
  - kind: export
    name: NeutralAtomKey.Lookup.masked/2
    file: lib/neutral_atom_key/lookup.ex
    expected: alive
    because: The real producer is a Map.get key; dispatch-like string/comment text is masked.
  - kind: export
    name: NeutralAtomKey.Lookup.predicate/2
    file: lib/neutral_atom_key/lookup.ex
    expected: alive
    because: Predicate punctuation remains code and the atom is solely a Map.has_key? key.
  - kind: export
    name: NeutralAtomKey.Lookup.rebuild/1
    file: lib/neutral_atom_key/lookup.ex
    expected: alive
    because: >-
      The atom is the complete key of the complete tuple returned by Enum.map,
      whose result flows immediately into Enum.into with a literal empty map.
  - kind: export
    name: NeutralAtomKey.Lookup.genuinely_unused/0
    file: lib/neutral_atom_key/lookup.ex
    expected: dead
    minConfidence: high
    because: Safe Map-key production does not cap an unrelated dead function.
