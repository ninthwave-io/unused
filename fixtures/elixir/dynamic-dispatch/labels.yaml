case: dynamic-dispatch
description: >-
  A module performing apply/3 dynamic dispatch caps its whole unit's confidence
  to medium — a genuinely dead function can still be surfaced, but never at high
  confidence, because an apply could name it at runtime.
subjects:
  - kind: export
    name: Dyn.Handlers.dead_handler/0
    file: lib/dyn/handlers.ex
    expected: dead
    minConfidence: medium
    because: >-
      dead_handler/0 is reached by nothing statically, but Dyn.Router calls
      apply/3, so the elixir-dynamic-dispatch hazard caps the whole unit at
      medium — a high-confidence claim here would be a bug.
  - kind: export
    name: Dyn.Handlers.ping/0
    file: lib/dyn/handlers.ex
    expected: alive
    because: The application callback statically calls Dyn.Handlers.ping/0.
