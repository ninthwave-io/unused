case: test-root-recognition
description: >-
  Under the M5 tier-2 partition (T5.1/T5.2), a file reached only from a root `test/` directory
  test file is `test-only` (not silently kept alive as in the M3 interim); the test file, which
  exercises only that test-only code, is itself a zombie `test`; and a clean dead export elsewhere
  still flags `unused` at high. (Pre-M5 these two were labelled `alive` under the interim
  test-reachable-keep-alive rule, now replaced.)
subjects:
  - kind: file
    name: src/feature.ts
    file: src/feature.ts
    expected: test-only
    minConfidence: high
    because: >-
      reached only by test/feature.test.ts (a file under a root-level `test/` directory, a
      zero-config test reachability root) and by no production or config entrypoint. Under the M5
      partition rule this is exactly the `test-only` verdict — deletable together with its test —
      at high confidence (no hazard applies). This label encoded the M3-INTERIM
      test-reachable-keep-alive assumption (`alive`) before M5; the interim assumption is now
      replaced, so a `test-only` claim here is a true positive and an `unused` claim would be a
      false positive (deleting the code alone breaks the test — the T2 story's hazard).
  - kind: test
    name: test/feature.test.ts
    file: test/feature.test.ts
    expected: test-only
    minConfidence: high
    because: >-
      a test file whose entire reach is src/feature.ts, itself `test-only` — it exercises no
      production-alive code, so it is a zombie test (the `test`/`test-only` subject, T5.2 point 3).
      Test files are never flagged as `file` subjects (they are reachability roots); a zombie is
      the one way a test file surfaces as a claim. High confidence: no hazard applies. (Pre-M5 this
      was labelled `file`/`alive`; the zombie verdict is new in M5.)
  - kind: export
    name: deadHelper
    file: src/util.ts
    expected: dead
    minConfidence: high
    because: never referenced anywhere, in production or test code; no hazard applies, so this is claimable at high confidence.
