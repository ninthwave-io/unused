case: config-project-scope
description: >-
  unused.config.jsonc declares "project": ["src/**"], narrowing which files
  may receive a claim without narrowing discovery. scripts/build.ts remains
  parsed so its edge is present, but it is itself unreachable from every
  root; under ADR 0012 an inbound edge from dead code does not make
  src/helper.ts alive. scripts/build.ts is deliberately unlabelled because it
  is outside claimability scope.
subjects:
  - kind: file
    name: src/helper.ts
    file: src/helper.ts
    expected: dead
    minConfidence: high
    because: >-
      imported only by scripts/build.ts, a file outside the config
      "project": ["src/**"] scope. The importer is still discovered and its
      edge retained, but no production/config/test root reaches it. Complete
      root reachability therefore classifies helper.ts as dead while keeping
      graph evidence intact for counterfactual queries.
  - kind: file
    name: src/orphan.ts
    file: src/orphan.ts
    expected: dead
    minConfidence: high
    because: >-
      inside the "project": ["src/**"] claimable scope and referenced by no
      file anywhere in the project — a clean dead file with no hazard in
      scope, the in-scope control alongside the narrowing-trap subject above.
